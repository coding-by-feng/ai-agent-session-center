name: Build Windows

on:
  # Run automatically when a new release/tag is published
  release:
    types: [published]
  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifact to (e.g. v2.5.1). Leave blank to just upload as artifact.'
        required: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Compile Electron TypeScript
        run: npx tsc -p tsconfig.electron.json

      - name: Rename CJS files (Windows)
        shell: pwsh
        run: |
          $dir = "dist/electron"
          Get-ChildItem -Path $dir -Filter "*.js" -Recurse | ForEach-Object {
            $newName = $_.FullName -replace '\.js$', '.cjs'
            Rename-Item -Path $_.FullName -NewName $newName
          }
          Get-ChildItem -Path $dir -Filter "*.cjs" -Recurse | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace 'require\("([^"]+)\.js"\)', 'require("$1.cjs")'
            $content = $content -replace "require\('([^']+)\.js'\)", "require('`$1.cjs')"
            Set-Content -Path $_.FullName -Value $content
          }

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "release") { "${{ github.ref_name }}" } else { "${{ github.event.inputs.tag }}" }
          $files = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -ExpandProperty FullName
          foreach ($file in $files) {
            gh release upload $tag $file --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
